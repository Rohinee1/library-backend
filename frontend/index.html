<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraryHub - Login</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h2 {
            color: #1e40af;
            font-weight: bold;
        }

        .btn-login {
            background: #1e40af;
            border: none;
        }

        .btn-login:hover {
            background: #1d4ed8;
        }

        #message {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <h2>📚 LibraryHub</h2>
        <p class="text-muted">Sign in to continue</p>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Enter email">
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter password">
    </div>

    <button class="btn btn-login text-white w-100" onclick="login()">
        Login
    </button>

    <div id="message"></div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
