<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibraryHub - Login</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    background: linear-gradient(135deg, #1e40af, #3b82f6, #1e3a8a);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
}

/* Glass Effect Card */
.login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    color: white;
    animation: fadeIn 0.6s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

.logo {
    text-align: center;
    margin-bottom: 25px;
}

.logo h2 {
    font-weight: 700;
}

.logo i {
    color: #fbbf24;
}

/* Inputs */
.form-control {
    border-radius: 10px;
    border: none;
    padding: 12px;
}

.form-control:focus {
    box-shadow: 0 0 0 2px rgba(255,255,255,0.4);
}

/* Button */
.btn-login {
    background: linear-gradient(135deg, #f59e0b, #fbbf24);
    border: none;
    padding: 12px;
    font-weight: 600;
    border-radius: 30px;
    transition: 0.3s;
}

.btn-login:hover {
    transform: translateY(-2px);
}

/* Message */
#message {
    margin-top: 15px;
    text-align: center;
}

/* Responsive */
@media(max-width: 500px){
    .login-card {
        margin: 15px;
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <h2><i class="fas fa-book"></i> LibraryHub</h2>
        <p class="text-light">Welcome back 👋</p>
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email">
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password">
    </div>

    <button class="btn btn-login w-100 text-white" onclick="login()">
        <i class="fas fa-sign-in-alt"></i> Login
    </button>

    <div id="message"></div>

</div>

<button onclick="login()">Login</button>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
